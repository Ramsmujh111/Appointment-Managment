version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: appointment_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appointment_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appointment_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy # wait until postgres is actually ready
    environment:
      PORT: 3000
      DB_HOST: postgres # uses the service name, not localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: appointment_db
      JWT_SECRET: change_this_in_production
      CANCEL_CUTOFF_MINUTES: 60
    ports:
      - '3000:3000'
    # no .env file needed — env vars are injected above

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: appointment_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
    # nginx.conf inside the image proxies /api/* to http://backend:3000

volumes:
  pgdata:
